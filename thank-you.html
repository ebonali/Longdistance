<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Movers Escargot</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to right, #ffffff 50%, #fde8c8 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .thank-container {
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            background: #fff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .left-side {
            flex: 1;
            padding: 4rem 3rem;
            min-width: 320px;
        }
        .right-side {
            flex: 1;
            background: #fde8c8;
            padding: 4rem 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 320px;
        }
        .confetti { font-size: 5.5rem; margin-bottom: 1.5rem; }
        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.2rem;
            line-height: 1.1;
            margin-bottom: 1rem;
        }
        h1 span {
            color: #f07c1e;
        }
        .message {
            font-size: 1.25rem;
            line-height: 1.7;
            font-weight: 600;
            color: #444;
            margin-bottom: 2.5rem;
        }
        .call-btn {
            background: #5bc4f5;
            color: #1a1f3a;
            padding: 1.1rem 2.5rem;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        .call-btn:hover {
            background: #f07c1e;
            color: #fff;
            transform: translateY(-4px);
        }
        .right-content {
            text-align: center;
            color: #1a1f3a;
            font-weight: 700;
        }
        .footer-text {
            font-size: 1.1rem;
            margin-top: 2rem;
            opacity: 0.9;
        }
        @media (max-width: 768px) {
            body { background: #fde8c8; }
            .thank-container { flex-direction: column; border-radius: 20px; }
            .left-side, .right-side { padding: 3rem 2rem; }
            h1 { font-size: 2.6rem; }
        }
    </style>
</head>
<body>

<div class="thank-container">
    <!-- Left Side - Main Content -->
    <div class="left-side">
        <div class="confetti">🎉</div>
        <h1>Thank You <span>for Choosing Us!</span></h1>
        
        <p class="message">
            Your long-distance moving quote request has been received successfully.<br><br>
            Our team will contact you shortly at the phone number or email you provided.
        </p>
        
        <a href="tel:5619510128" class="call-btn">
            📞 Call Us Now — (561) 951-0128
        </a>
    </div>

    <!-- Right Side - Branding -->
    <div class="right-side">
        <div class="right-content">
            <p class="footer-text">
                © 2026 Movers Escargot<br>
                Florida Long-Distance Movers
            </p>
        </div>
    </div>
</div>

</body>
</html>
